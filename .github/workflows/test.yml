# ============================================================
# PHP SECURITY & TESTING PIPELINE - GITLEAKS + PHPUNIT
# ============================================================
# 🔧 WHAT THIS DOES:
#   - 🔒 Gitleaks: Scans for hardcoded secrets/tokens in code
#   - 🧪 PHPUnit/Pest: Runs tests with coverage
#   - 📊 Code Quality: PHPStan static analysis & PHPCS style check
#   - 📤 Uploads: Test results and coverage reports
#
# 📋 TRIGGERS:
#   - Push to main, develop, and feature branches
#   - Pull requests to main branch
#   - Manual trigger via workflow_dispatch
# ============================================================

name: PHP Security Scan & Tests

on:
  push:
    branches: [ "main", "develop", "feature/*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:  # Manual trigger

env:
  PHP_VERSION: '8.2'
  EXTENSIONS: mbstring, xml, ctype, json, tokenizer, bcmath, pdo_mysql, pdo_pgsql, intl, zip, curl, gd

jobs:
  # ==========================================================
  # JOB 1: SECURITY SCANNING (Gitleaks)
  # ==========================================================
  security-scan:
    name: 🔒 Security Scan (Gitleaks)
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout code with full history
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better scanning
      
      # 2. Run Gitleaks scan
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config: |
            [rules]
              [rules.secrets]
                description = "Generic Secret"
                regex = '''(?i)(?:key|token|secret|password|auth|credential)[^a-zA-Z0-9]*[=:][^a-zA-Z0-9]*([a-zA-Z0-9_\-\.\/]{8,})'''
                tags = ["secret", "generic"]
            
            [rules.aws]
              description = "AWS Access Key"
              regex = '''(AKIA[0-9A-Z]{16})'''
              tags = ["aws", "secret"]
            
            [rules.private-key]
              description = "Private Key"
              regex = '''-----BEGIN (?:RSA|DSA|EC|OPENSSH) PRIVATE KEY-----'''
              tags = ["key", "private"]
            
            [rules.github-token]
              description = "GitHub Token"
              regex = '''(ghp|gho|ghu|ghs|ghr)_[a-zA-Z0-9]{36}'''
              tags = ["github", "token"]
            
            [rules.api-key]
              description = "Generic API Key"
              regex = '''[a-zA-Z0-9_\-]{32,64}'''
              tags = ["api", "key"]
            
            [rules.jwt]
              description = "JWT Token"
              regex = '''eyJ[a-zA-Z0-9]{10,}\.eyJ[a-zA-Z0-9]{10,}\.[a-zA-Z0-9_-]{10,}'''
              tags = ["jwt", "token"]
      
      # 3. Upload scan results
      - name: Upload Gitleaks results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-results
          path: gitleaks-report.json
      
      # 4. Send alert if secrets found
      - name: Send alert if secrets found
        if: failure()
        run: |
          echo "🔴 SECURITY ALERT: Gitleaks found potential secrets in the code!"
          echo "Please check the scan results and remove any exposed secrets."
          echo "📊 Download the gitleaks-results artifact to see details."
          exit 1
      
      # 5. Success message
      - name: Security scan passed
        if: success()
        run: |
          echo "✅ No secrets found in the code!"
          echo "🔒 Your code is secure."

  # ==========================================================
  # JOB 2: PHP TESTS & CODE QUALITY
  # ==========================================================
  php-tests:
    name: 🧪 PHP Tests & Code Quality
    runs-on: ubuntu-latest
    needs: security-scan  # Runs only if security scan passes
    
    strategy:
      matrix:
        php-versions: ['8.1', '8.2']  # Test against multiple PHP versions
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_db
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3
    
    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4
      
      # 2. Setup PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
          extensions: ${{ env.EXTENSIONS }}
          coverage: xdebug
          tools: composer, phpunit, php-cs-fixer
      
      # 3. Validate composer.json
      - name: Validate composer.json
        run: composer validate --strict
      
      # 4. Cache Composer dependencies
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            vendor/
            ~/.cache/composer
          key: ${{ runner.os }}-php${{ matrix.php-versions }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php${{ matrix.php-versions }}-composer-
            ${{ runner.os }}-composer-
      
      # 5. Install dependencies
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-suggest
      
      # 6. Create environment file for testing
      - name: Setup environment
        run: |
          if [ -f ".env.example" ]; then
            cp .env.example .env
          else
            echo "APP_ENV=testing" > .env
            echo "APP_DEBUG=true" >> .env
            echo "APP_URL=http://localhost" >> .env
            echo "DB_CONNECTION=mysql" >> .env
            echo "DB_HOST=127.0.0.1" >> .env
            echo "DB_PORT=3306" >> .env
            echo "DB_DATABASE=test_db" >> .env
            echo "DB_USERNAME=root" >> .env
            echo "DB_PASSWORD=root" >> .env
            echo "REDIS_HOST=127.0.0.1" >> .env
            echo "REDIS_PORT=6379" >> .env
          fi
          
          # Generate application key for Laravel
          if [ -f "artisan" ]; then
            php artisan key:generate
          fi
      
      # 7. Run database migrations
      - name: Run migrations
        if: hashFiles('database/migrations') != ''
        run: |
          if [ -f "artisan" ]; then
            php artisan migrate --force
          fi
      
      # 8. Run static analysis (PHPStan)
      - name: Run PHPStan static analysis
        run: |
          if [ -f "./vendor/bin/phpstan" ]; then
            ./vendor/bin/phpstan analyse app/ src/ --level=5 --no-progress
          else
            echo "⚠️ PHPStan not installed, skipping..."
          fi
      
      # 9. Run code style check (PHPCS)
      - name: Run PHP Code Sniffer
        run: |
          if [ -f "./vendor/bin/phpcs" ]; then
            ./vendor/bin/phpcs --standard=PSR12 app/ src/ --ignore=vendor/ --report=summary
          else
            echo "⚠️ PHPCS not installed, skipping..."
          fi
      
      # 10. Run tests with coverage
      - name: Run PHPUnit tests
        run: |
          if [ -f "./vendor/bin/phpunit" ]; then
            ./vendor/bin/phpunit --testdox --coverage-clover=coverage.xml --coverage-html=coverage-report
          elif [ -f "./vendor/bin/pest" ]; then
            ./vendor/bin/pest --testdox --coverage-clover=coverage.xml --coverage-html=coverage-report
          else
            echo "❌ No test runner found"
            exit 1
          fi
      
      # 11. Upload coverage to Codecov
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
      
      # 12. Upload test results
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-php${{ matrix.php-versions }}
          path: |
            coverage-report/
            tests/_output/
            *.xml
          retention-days: 7
      
      # 13. Success message
      - name: Tests passed
        if: success()
        run: |
          echo "✅ All tests passed successfully!"
          echo "📊 Coverage report uploaded as artifact"

  # ==========================================================
  # JOB 3: TEST SUMMARY & NOTIFICATIONS
  # ==========================================================
  test-summary:
    name: 📊 Test Summary
    runs-on: ubuntu-latest
    needs: [security-scan, php-tests]
    if: always()
    
    steps:
      # 1. Check overall status
      - name: Check status
        run: |
          echo "📊 TEST SUMMARY"
          echo "================"
          
          if [ "${{ needs.security-scan.result }}" == "success" ] && [ "${{ needs.php-tests.result }}" == "success" ]; then
            echo "✅ ALL CHECKS PASSED!"
            echo "🔒 No secrets found"
            echo "🧪 All PHP tests passed"
            echo "📊 Code quality checks passed"
            exit 0
          else
            echo "❌ SOME CHECKS FAILED!"
            [ "${{ needs.security-scan.result }}" != "success" ] && echo "🔴 Security scan failed - Secrets may be exposed!"
            [ "${{ needs.php-tests.result }}" != "success" ] && echo "🔴 PHP tests failed"
            exit 1
          fi
      
      # 2. Send notification (only if configured)
      - name: Send Slack notification
        if: success() && secrets.SLACK_BOT_TOKEN != ''
        uses: slackapi/slack-github-action@v1.24.0
        with:
          channel-id: '#security-tests'
          slack-message: |
            ✅ Security & Test Pipeline Passed!
            📊 Branch: ${{ github.ref_name }}
            🔒 Secrets: No issues found
            🧪 Tests: All passed
          env:
            SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      
      - name: Send Slack notification (failure)
        if: failure() && secrets.SLACK_BOT_TOKEN != ''
        uses: slackapi/slack-github-action@v1.24.0
        with:
          channel-id: '#security-tests'
          slack-message: |
            ❌ Security & Test Pipeline Failed!
            📊 Branch: ${{ github.ref_name }}
            🔒 Security: ${{ needs.security-scan.result }}
            🧪 Tests: ${{ needs.php-tests.result }}
            🔍 Please check the Actions tab for details.
          env:
            SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
