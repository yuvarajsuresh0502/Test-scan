# ============================================================
# PHP TESTING & SECURITY SCANNING PIPELINE
# ============================================================
# 🔧 WHAT THIS DOES:
#   - 🔒 Gitleaks: Scans for hardcoded secrets/tokens in code
#   - 🧪 Test: Runs PHPUnit/Pest tests with coverage
#   - 📊 Code Quality: PHPStan & PHPCS checks
#
# 📋 TRIGGERS:
#   - Push to main, develop, and feature branches
#   - Pull requests to main branch
#   - Manual trigger via workflow_dispatch
# ============================================================

name: PHP Testing & Security Scan

on:
  push:
    branches: [ "main", "develop", "feature/*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:  # Manual trigger

env:
  PHP_VERSION: '8.2'
  EXTENSIONS: mbstring, xml, ctype, json, tokenizer, bcmath, pdo_mysql, pdo_pgsql, intl, zip, curl, gd

jobs:
  # ==========================================================
  # JOB 1: SECURITY SCANNING (Gitleaks)
  # ==========================================================
  security-scan:
    name: 🔒 Security Scan (Gitleaks)
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout code with full history
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better scanning
      
      # 2. Run Gitleaks scan
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config: |
            [rules]
              [rules.secrets]
                description = "Generic Secret"
                regex = '''(?i)(?:key|token|secret|password|auth|credential)[^a-zA-Z0-9]*[=:][^a-zA-Z0-9]*([a-zA-Z0-9_\-\.\/]{8,})'''
                tags = ["secret", "generic"]
            
            [rules.aws]
              description = "AWS Access Key"
              regex = '''(AKIA[0-9A-Z]{16})'''
              tags = ["aws", "secret"]
            
            [rules.private-key]
              description = "Private Key"
              regex = '''-----BEGIN (?:RSA|DSA|EC|OPENSSH) PRIVATE KEY-----'''
              tags = ["key", "private"]
      
      # 3. Upload scan results
      - name: Upload Gitleaks results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-results
          path: gitleaks-report.json
      
      # 4. Send alert if secrets found
      - name: Send alert if secrets found
        if: failure()
        run: |
          echo "🔴 SECURITY ALERT: Gitleaks found potential secrets in the code!"
          echo "Please check the scan results and remove any exposed secrets."
          exit 1

  # ==========================================================
  # JOB 2: PHP TESTS & CODE QUALITY
  # ==========================================================
  test:
    name: 🧪 PHP Tests & Code Quality
    runs-on: ubuntu-latest
    needs: security-scan  # Runs only if security scan passes
    
    strategy:
      matrix:
        php-versions: ['8.1', '8.2']  # Test against multiple PHP versions
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_db
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3
    
    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4
      
      # 2. Setup PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
          extensions: ${{ env.EXTENSIONS }}
          coverage: xdebug
          tools: composer, phpunit, php-cs-fixer
      
      # 3. Validate composer.json
      - name: Validate composer.json
        run: composer validate --strict
      
      # 4. Cache Composer dependencies
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            vendor/
            ~/.cache/composer
          key: ${{ runner.os }}-php${{ matrix.php-versions }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php${{ matrix.php-versions }}-composer-
            ${{ runner.os }}-composer-
      
      # 5. Install dependencies
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-suggest
      
      # 6. Create environment file for testing
      - name: Setup environment
        run: |
          if [ -f ".env.example" ]; then
            cp .env.example .env
          else
            echo "APP_ENV=testing" > .env
            echo "APP_DEBUG=true" >> .env
            echo "APP_URL=http://localhost" >> .env
            echo "DB_CONNECTION=mysql" >> .env
            echo "DB_HOST=127.0.0.1" >> .env
            echo "DB_PORT=3306" >> .env
            echo "DB_DATABASE=test_db" >> .env
            echo "DB_USERNAME=root" >> .env
            echo "DB_PASSWORD=root" >> .env
            echo "REDIS_HOST=127.0.0.1" >> .env
            echo "REDIS_PORT=6379" >> .env
          fi
          
          # Generate application key for Laravel
          if [ -f "artisan" ]; then
            php artisan key:generate
          fi
      
      # 7. Run database migrations
      - name: Run migrations
        if: hashFiles('database/migrations') != ''
        run: |
          if [ -f "artisan" ]; then
            php artisan migrate --force
          fi
      
      # 8. Run static analysis (PHPStan)
      - name: Run PHPStan
        run: |
          if [ -f "./vendor/bin/phpstan" ]; then
            ./vendor/bin/phpstan analyse app/ src/ --level=5 --no-progress
          else
            echo "PHPStan not installed, skipping..."
          fi
      
      # 9. Run code style check (PHPCS)
      - name: Run PHP Code Sniffer
        run: |
          if [ -f "./vendor/bin/phpcs" ]; then
            ./vendor/bin/phpcs --standard=PSR12 app/ src/ --ignore=vendor/ --report=summary
          else
            echo "PHPCS not installed, skipping..."
          fi
      
      # 10. Run PHP Mess Detector (PHPMD) - Optional
      - name: Run PHPMD
        run: |
          if [ -f "./vendor/bin/phpmd" ]; then
            ./vendor/bin/phpmd app/ text cleancode,codesize,controversial,design,naming,unusedcode || true
          else
            echo "PHPMD not installed, skipping..."
          fi
      
      # 11. Run tests with coverage
      - name: Run PHPUnit tests
        run: |
          if [ -f "./vendor/bin/phpunit" ]; then
            ./vendor/bin/phpunit --testdox --coverage-clover=coverage.xml --coverage-html=coverage-report
          elif [ -f "./vendor/bin/pest" ]; then
            ./vendor/bin/pest --testdox --coverage-clover=coverage.xml --coverage-html=coverage-report
          else
            echo "No test runner found"
            exit 1
          fi
      
      # 12. Upload test coverage to Codecov
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
      
      # 13. Upload test results as artifacts
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-php${{ matrix.php-versions }}
          path: |
            coverage-report/
            tests/_output/
            *.xml
      
      # 14. Check test coverage percentage
      - name: Check coverage threshold
        run: |
          if [ -f "./coverage.xml" ]; then
            COVERAGE=$(grep -o 'line-rate="[0-9.]*"' coverage.xml | head -1 | cut -d'"' -f2)
            COVERAGE_PERCENT=$(echo "$COVERAGE * 100" | bc)
            echo "📊 Test coverage: $COVERAGE_PERCENT%"
            
            THRESHOLD=80
            if (( $(echo "$COVERAGE_PERCENT < $THRESHOLD" | bc -l) )); then
              echo "⚠️ Coverage is below $THRESHOLD% threshold!"
              exit 1
            else
              echo "✅ Coverage is above $THRESHOLD% threshold"
            fi
          fi
        continue-on-error: true  # Don't fail the build for coverage

  # ==========================================================
  # JOB 3: NOTIFICATIONS (Optional)
  # ==========================================================
  notifications:
    name: 📢 Notifications
    runs-on: ubuntu-latest
    needs: test
    if: always()
    
    steps:
      # 1. Send status notification
      - name: Send GitHub status check
        uses: actions/github-script@v6
        with:
          script: |
            const status = '${{ needs.test.result }}';
            const emoji = status === 'success' ? '✅' : '❌';
            const message = `${emoji} Tests ${
              status === 'success' ? 'passed' : 'failed'
            } for ${process.env.GITHUB_REF_NAME}`;
            
            console.log(message);
            
            // Create status check
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: status === 'success' ? 'success' : 'failure',
              context: 'PHP Tests & Security Scan',
              description: status === 'success' ? 'All tests passed!' : 'Tests failed!',
            });
      
      # 2. Send Slack notification (if configured)
      - name: Send Slack notification
        if: success() && secrets.SLACK_WEBHOOK != ''
        uses: slackapi/slack-github-action@v1.24.0
        with:
          channel-id: '#ci-cd'
          slack-message: |
            ✅ Tests passed! 
            📦 Repository: ${{ github.repository }}
            🌿 Branch: ${{ github.ref_name }}
            👤 Author: ${{ github.actor }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        continue-on-error: true
      
      # 3. Send email notification (if configured)
      - name: Send email notification
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "❌ Test Failed: ${{ github.repository }}"
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: GitHub Actions
          body: |
            Tests failed for repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
            
            Check the GitHub Actions for details:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        continue-on-error: true
