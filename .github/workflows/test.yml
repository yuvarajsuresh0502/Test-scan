# ============================================================
# GITLEAKS SECURITY SCANNING - PHP & PYTHON REPOSITORIES
# ============================================================
# 🔧 WHAT THIS DOES:
#   - 🔒 Scans entire repository for hardcoded secrets
#   - 🐍 Detects Python-specific secrets (Django, Flask, etc.)
#   - 🐘 Detects PHP-specific secrets (Laravel, Symfony, etc.)
#   - 📊 Generates detailed scan reports
#   - 🚨 Blocks PRs if secrets are found
#   - 📤 Uploads scan results as artifacts
#
# 📋 TRIGGERS:
#   - Push to any branch
#   - Pull requests to main/develop
#   - Manual trigger via workflow_dispatch
#   - Scheduled scans (weekly)
# ============================================================

name: 🔒 Gitleaks Secret Scanner

on:
  push:
    branches: [ "*" ]  # Scan all pushes to all branches
  pull_request:
    branches: [ "main", "develop", "master" ]
  workflow_dispatch:  # Manual trigger
  schedule:
    - cron: '0 0 * * 0'  # Weekly scan every Sunday at midnight

jobs:
  # ==========================================================
  # JOB 1: GITLEAKS SECURITY SCAN
  # ==========================================================
  gitleaks-scan:
    name: 🔒 Gitleaks Security Scan
    runs-on: ubuntu-latest
    
    # Permissions needed for PR comments
    permissions:
      contents: read
      pull-requests: write
      security-events: write
      actions: read
      checks: write
    
    steps:
      # 1. Checkout code with full history
      - name: 📦 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for complete scan
      
      # 2. Create Gitleaks configuration
      - name: 📝 Create Gitleaks config
        run: |
          cat > .gitleaks.toml << 'EOF'
          title = "Gitleaks Configuration for PHP & Python"
          
          # Extend default rules
          [extend]
          useDefault = true
          
          # ================================
          # PHP SPECIFIC RULES
          # ================================
          [[rules]]
          id = "php-database-credentials"
          description = "PHP Database Credentials"
          regex = '''\$[a-zA-Z_][a-zA-Z0-9_]*\s*=\s*['"](?:mysql|pgsql|sqlite|mongodb)://[^'"]+['"]'''
          tags = ["php", "database", "credentials"]
          
          [[rules]]
          id = "php-laravel-env-key"
          description = "Laravel APP_KEY in PHP"
          regex = '''APP_KEY\s*=\s*base64:[a-zA-Z0-9+/=]+'''
          tags = ["php", "laravel", "key"]
          
          [[rules]]
          id = "php-api-keys"
          description = "PHP API Keys"
          regex = '''(?:api_key|apikey|secret|token)\s*=\s*['"][a-zA-Z0-9_\-\.]{16,}['"]'''
          tags = ["php", "api", "key"]
          
          [[rules]]
          id = "php-env-credentials"
          description = "PHP .env Credentials"
          regex = '''(?i)(DB_(?:PASSWORD|USERNAME|HOST)|REDIS_PASSWORD|MAIL_PASSWORD|AWS_(?:ACCESS_KEY_ID|SECRET_ACCESS_KEY))\s*=\s*['"]?[a-zA-Z0-9_\-\.]{8,}['"]?'''
          tags = ["php", "env", "credentials"]
          
          [[rules]]
          id = "php-password-hash"
          description = "PHP Password Hash"
          regex = '''password_hash\s*\(\s*['"][^'"]+['"]\s*,\s*PASSWORD_(?:BCRYPT|ARGON2I|ARGON2ID)'''
          tags = ["php", "password", "hash"]
          
          [[rules]]
          id = "php-session-hijacking"
          description = "PHP Session ID"
          regex = '''session_id\s*\(\s*['"][a-f0-9]{32,40}['"]\s*\)'''
          tags = ["php", "session", "security"]
          
          # ================================
          # PYTHON SPECIFIC RULES
          # ================================
          [[rules]]
          id = "python-django-secret"
          description = "Django Secret Key"
          regex = '''SECRET_KEY\s*=\s*['"][a-zA-Z0-9@#%^&*()_+{}:|<>?~\-]{40,}['"]'''
          tags = ["python", "django", "key"]
          
          [[rules]]
          id = "python-flask-secret"
          description = "Flask Secret Key"
          regex = '''SECRET_KEY\s*=\s*['"][a-zA-Z0-9_\-\.]{32,}['"]'''
          tags = ["python", "flask", "key"]
          
          [[rules]]
          id = "python-database-url"
          description = "Python Database URL"
          regex = '''(?:postgresql|mysql|sqlite|mongodb|redis)://[a-zA-Z0-9_\-]+:[^@]+@[a-zA-Z0-9_\-\.]+'''
          tags = ["python", "database", "credentials"]
          
          [[rules]]
          id = "python-aws-credentials"
          description = "Python AWS Credentials"
          regex = '''(?:AWS_ACCESS_KEY_ID|AWS_SECRET_ACCESS_KEY|AWS_SESSION_TOKEN)\s*=\s*['"][a-zA-Z0-9/+=]{16,}['"]'''
          tags = ["python", "aws", "credentials"]
          
          [[rules]]
          id = "python-jwt-token"
          description = "Python JWT Token"
          regex = '''(?:jwt|token)\s*=\s*['"]eyJ[a-zA-Z0-9_-]{10,}\.[a-zA-Z0-9_-]{10,}\.[a-zA-Z0-9_-]{10,}['"]'''
          tags = ["python", "jwt", "token"]
          
          [[rules]]
          id = "python-api-keys"
          description = "Python API Keys"
          regex = '''(?:api_key|apikey|token|secret)\s*=\s*['"][a-zA-Z0-9_\-\.]{20,}['"]'''
          tags = ["python", "api", "key"]
          
          [[rules]]
          id = "python-env-credentials"
          description = "Python .env Credentials"
          regex = '''(?i)(DB_(?:PASSWORD|USERNAME)|REDIS_PASSWORD|EMAIL_PASSWORD|SECRET_KEY)\s*=\s*['"]?[a-zA-Z0-9_\-\.]{8,}['"]?'''
          tags = ["python", "env", "credentials"]
          
          [[rules]]
          id = "python-ssh-key"
          description = "Python SSH Key"
          regex = '''-----BEGIN (?:RSA|DSA|EC|OPENSSH) PRIVATE KEY-----'''
          tags = ["python", "ssh", "key"]
          
          # ================================
          # COMMON SECRETS (PHP & Python)
          # ================================
          [[rules]]
          id = "generic-api-key"
          description = "Generic API Key"
          regex = '''[a-zA-Z0-9_\-]{32,64}'''
          tags = ["generic", "api", "key"]
          
          [[rules]]
          id = "aws-access-key"
          description = "AWS Access Key"
          regex = '''(AKIA|ASIA)[0-9A-Z]{16}'''
          tags = ["aws", "access", "key"]
          
          [[rules]]
          id = "github-token"
          description = "GitHub Token"
          regex = '''(ghp|gho|ghu|ghs|ghr)_[a-zA-Z0-9]{36}'''
          tags = ["github", "token"]
          
          [[rules]]
          id = "slack-token"
          description = "Slack Token"
          regex = '''xox[baprs]-[a-zA-Z0-9-]+'''
          tags = ["slack", "token"]
          
          [[rules]]
          id = "jwt-token"
          description = "JWT Token"
          regex = '''eyJ[a-zA-Z0-9_-]{10,}\.eyJ[a-zA-Z0-9_-]{10,}\.[a-zA-Z0-9_-]{10,}'''
          tags = ["jwt", "token"]
          
          [[rules]]
          id = "private-key"
          description = "Private Key"
          regex = '''-----BEGIN (?:RSA|DSA|EC|OPENSSH|PGP) PRIVATE KEY BLOCK-----'''
          tags = ["key", "private"]
          
          [[rules]]
          id = "mongodb-connection"
          description = "MongoDB Connection String"
          regex = '''mongodb(?:\+srv)?://[a-zA-Z0-9_\-]+:[^@]+@[a-zA-Z0-9_\-\.]+'''
          tags = ["mongodb", "database", "connection"]
          
          [[rules]]
          id = "redis-connection"
          description = "Redis Connection String"
          regex = '''redis://[a-zA-Z0-9_\-]+:[^@]+@[a-zA-Z0-9_\-\.]+'''
          tags = ["redis", "database", "connection"]
          
          # ================================
          # ALLOWLIST (Exclude paths/files)
          # ================================
          [allowlist]
          description = "Files and paths to exclude from scanning"
          paths = [
            '''\.git/''',
            '''vendor/''',
            '''node_modules/''',
            '''venv/''',
            '''env/''',
            '''__pycache__/''',
            '''\.pytest_cache/''',
            '''\.mypy_cache/''',
            '''\.tox/''',
            '''coverage/''',
            '''storage/''',
            '''bootstrap/cache/''',
            '''\.phpunit\.result\.cache''',
            '''composer\.lock''',
            '''package-lock\.json''',
            '''poetry\.lock''',
            '''Pipfile\.lock''',
            '''yarn\.lock''',
          ]
          
          [allowlist.regexes]
          description = "Regex patterns to exclude"
          regexes = [
            '''[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}''',  # UUID
            '''generated|example|test|dummy|placeholder|sample''',
            '''\$\{.*?\}''',  # Environment variables
            '''\b[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\b''',  # IP addresses
          ]
          EOF
          
          echo "✅ Gitleaks configuration created"
          cat .gitleaks.toml
      
      # 3. Run Gitleaks scan
      - name: 🔍 Run Gitleaks scan
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config: .gitleaks.toml
          report-format: sarif,json
          scan-path: "."
          fail-on-secrets: true
      
      # 4. Upload SARIF report to GitHub Security tab
      - name: 📤 Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: gitleaks-results.sarif
          category: gitleaks
      
      # 5. Upload JSON report as artifact
      - name: 📤 Upload Gitleaks JSON results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-results
          path: |
            gitleaks-results.json
            gitleaks-results.sarif
          retention-days: 90
      
      # 6. Generate summary report
      - name: 📊 Generate summary
        if: always()
        run: |
          echo "## 🔒 Gitleaks Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "gitleaks-results.json" ]; then
            TOTAL=$(jq '.length' gitleaks-results.json 2>/dev/null || echo "0")
            echo "### 📊 Summary" >> $GITHUB_STEP_SUMMARY
            echo "- **Total secrets found:** $TOTAL" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            if [ "$TOTAL" -gt 0 ]; then
              echo "### 🚨 Secrets Found" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "| File | Line | Rule | Description |" >> $GITHUB_STEP_SUMMARY
              echo "|------|------|------|-------------|" >> $GITHUB_STEP_SUMMARY
              
              jq -r '.[] | "| `\(.File)` | \(.Line) | `\(.RuleID)` | \(.Description) |"' gitleaks-results.json 2>/dev/null | head -20 >> $GITHUB_STEP_SUMMARY
              
              TOTAL=$(jq '.length' gitleaks-results.json 2>/dev/null || echo "0")
              if [ "$TOTAL" -gt 20 ]; then
                echo "| ... | ... | ... | *$((TOTAL - 20)) more results* |" >> $GITHUB_STEP_SUMMARY
              fi
              
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "### ❌ FAILED: Secrets found in repository!" >> $GITHUB_STEP_SUMMARY
              echo "Please check the artifact for full details." >> $GITHUB_STEP_SUMMARY
            else
              echo "### ✅ SUCCESS: No secrets found!" >> $GITHUB_STEP_SUMMARY
              echo "Your repository is secure." >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "### ⚠️ No results file found" >> $GITHUB_STEP_SUMMARY
          fi
      
      # 7. Post comment on PR
      - name: 💬 Post comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            let comment = '## 🔒 Gitleaks Security Scan\n\n';
            
            try {
              if (fs.existsSync('gitleaks-results.json')) {
                const data = fs.readFileSync('gitleaks-results.json', 'utf8');
                const results = JSON.parse(data);
                const total = results.length || 0;
                
                if (total === 0) {
                  comment += '✅ **No secrets found!**\n\n';
                  comment += 'Your code passes the security scan. All good! 🎉';
                } else {
                  comment += `❌ **${total} potential secrets found!**\n\n`;
                  comment += '#### 🚨 List of secrets found:\n\n';
                  comment += '| File | Line | Rule |\n';
                  comment += '|------|------|------|\n';
                  
                  const limited = results.slice(0, 10);
                  limited.forEach(result => {
                    const file = path.basename(result.File) || result.File;
                    comment += `| \`${file}\` | ${result.Line} | \`${result.RuleID}\` |\n`;
                  });
                  
                  if (total > 10) {
                    comment += `\n*... and ${total - 10} more results. Download the artifact for full details.*\n`;
                  }
                  
                  comment += '\n#### 📝 Please fix these issues before merging:\n';
                  comment += '1. Remove hardcoded secrets from code\n';
                  comment += '2. Use environment variables instead\n';
                  comment += '3. Rotate any exposed secrets\n';
                  comment += '4. Download the full report from artifacts';
                }
              } else {
                comment += '⚠️ No scan results available.';
              }
            } catch (error) {
              comment += '⚠️ Error reading scan results. Please check workflow logs.';
              console.error('Error:', error);
            }
            
            // Post comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            
            const existingComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('Gitleaks Security Scan')
            );
            
            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: comment,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: comment,
              });
            }
      
      # 8. Block PR if secrets found
      - name: 🚫 Block PR if secrets found
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            
            try {
              if (fs.existsSync('gitleaks-results.json')) {
                const data = fs.readFileSync('gitleaks-results.json', 'utf8');
                const results = JSON.parse(data);
                const total = results.length || 0;
                
                if (total > 0) {
                  const message = `🚫 **Pull Request Blocked**\n\n` +
                                 `❌ ${total} potential secrets found in this PR.\n\n` +
                                 `📝 **Actions Required:**\n` +
                                 `1. Remove all hardcoded secrets from your code\n` +
                                 `2. Use environment variables or GitHub Secrets\n` +
                                 `3. Rotate any exposed credentials\n` +
                                 `4. Push fixes to this branch\n\n` +
                                 `📊 Download the Gitleaks report from artifacts for details.`;
                  
                  // Add check run
                  await github.rest.checks.create({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: 'Gitleaks Security Scan',
                    head_sha: context.payload.pull_request.head.sha,
                    status: 'completed',
                    conclusion: 'failure',
                    output: {
                      title: 'Secrets found in code',
                      summary: `${total} potential secrets found`,
                      text: message,
                    },
                  });
                  
                  core.setFailed(`❌ ${total} secrets found - PR blocked`);
                }
              }
            } catch (error) {
              console.error('Error blocking PR:', error);
            }

  # ==========================================================
  # JOB 2: SUMMARY & NOTIFICATIONS (FIXED)
  # ==========================================================
  summary:
    name: 📊 Summary & Notifications
    runs-on: ubuntu-latest
    needs: gitleaks-scan
    if: always()
    
    steps:
      # 1. Check final status
      - name: ✅ Check final status
        run: |
          echo "## 📊 Gitleaks Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.gitleaks-scan.result }}" == "success" ]; then
            echo "### ✅ All security checks passed!" >> $GITHUB_STEP_SUMMARY
            echo "🔒 No secrets found in repository." >> $GITHUB_STEP_SUMMARY
            echo "📊 Full report available in artifacts." >> $GITHUB_STEP_SUMMARY
            echo "STATUS=success" >> $GITHUB_ENV
          else
            echo "### ❌ Security issues found!" >> $GITHUB_STEP_SUMMARY
            echo "🚨 Potential secrets detected in your code." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "📝 **Next Steps:**" >> $GITHUB_STEP_SUMMARY
            echo "1. Download the Gitleaks report from artifacts" >> $GITHUB_STEP_SUMMARY
            echo "2. Remove all hardcoded secrets from code" >> $GITHUB_STEP_SUMMARY
            echo "3. Use environment variables or secrets management" >> $GITHUB_STEP_SUMMARY
            echo "4. Rotate any exposed credentials immediately" >> $GITHUB_STEP_SUMMARY
            echo "STATUS=failure" >> $GITHUB_ENV
            exit 1
          fi
      
      # 2. Send Slack notification (FIXED)
      - name: 📢 Send Slack notification
        if: always() && secrets.SLACK_WEBHOOK != ''
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "${{ needs.gitleaks-scan.result == 'success' && '✅' || '❌' }} Gitleaks Scan: ${{ needs.gitleaks-scan.result }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "${{ needs.gitleaks-scan.result == 'success' && '✅' || '❌' }} *Gitleaks Security Scan*"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Status:*\n${{ needs.gitleaks-scan.result }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Repository:*\n${{ github.repository }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\n${{ github.ref_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Trigger:*\n${{ github.event_name }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "🔗 <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
      
      # 3. Send email alert (optional)
      - name: 📧 Send email alert
        if: failure() && secrets.EMAIL_TO != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "🚨 Gitleaks Security Alert: ${{ github.repository }}"
          to: ${{ secrets.EMAIL_TO }}
          from: GitHub Actions
          body: |
            🔒 Gitleaks Security Scan Failed
            
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Trigger: ${{ github.event_name }}
            
            ❌ Potential secrets were found in the code!
            
            Please check the GitHub Actions run for details:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
